<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda do Aluno</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card h2 {
            margin: 0;
            color: #333;
        }

        .info {
            margin-top: 10px;
        }

        .info p {
            margin: 6px 0;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            margin-right: 5px;
        }

        .planejado {
            background: orange;
        }

        .executado {
            background: green;
        }

        .empty {
            text-align: center;
            color: white;
            font-size: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>📚 Agenda do Aluno</h1>
</header>

<div class="container">

{% for tarefa in tarefas %}
    <div class="card">
        <h2>{{ tarefa.disciplina.nome }}</h2>

        <div class="info">
            <p><strong>📖 Aula:</strong> {{ tarefa.aula }}</p>

            <p>
                <span class="badge planejado">Planejado</span>
                {{ tarefa.planejado }}
            </p>

            <p>
                <span class="badge executado">Executado</span>
                {{ tarefa.executado }}
            </p>

            <p><strong>📌 Tarefa:</strong> {{ tarefa.tarefa_casa }}</p>
        </div>
    </div>

{% empty %}
    <p class="empty">🚫 Nenhuma tarefa cadastrada</p>
{% endfor %}

</div>

</body>
</html>
