<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda do Aluno</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --bg-body: #f4f7f6;
            --text-main: #2d3436;
            --status-planned: #fd9644;
            --status-done: #20bf6b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            background-attachment: fixed;
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border-left: 8px solid var(--primary-color);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info {
            display: grid;
            gap: 12px;
            margin-top: 15px;
        }

        .info p {
            margin: 0;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .info strong {
            min-width: 110px;
            color: #636e72;
        }

        /* Estilização das Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 50px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 10px;
            display: inline-block;
        }

        .planejado { background: var(--status-planned); }
        .executado { background: var(--status-done); }

        /* Estilo para quando não há tarefas */
        .empty {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            color: white;
            backdrop-filter: blur(5px);
            border: 2px dashed rgba(255, 255, 255, 0.4);
        }

        /* Responsividade básica */
        @media (max-width: 600px) {
            .container { width: 95%; }
            .info p { flex-direction: column; align-items: flex-start; }
            .badge { margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-graduation-cap"></i> Agenda do Aluno</h1>
</header>

<div class="container">

{% for tarefa in tarefas %}
    <div class="card">
        <h2><i class="fas fa-book-open"></i> {{ tarefa.disciplina.nome }}</h2>

        <div class="info">
            <p><strong><i class="fas fa-chalkboard-teacher"></i> Aula:</strong> {{ tarefa.aula }}</p>

            <p>
                <span class="badge planejado">Planejado</span>
                <span>{{ tarefa.planejado }}</span>
            </p>

            <p>
                <span class="badge executado">Executado</span>
                <span>{{ tarefa.executado }}</span>
            </p>

            <p><strong><i class="fas fa-home"></i> Tarefa:</strong> {{ tarefa.tarefa_casa }}</p>
        </div>
    </div>
{% empty %}
    <div class="empty">
        <i class="fas fa-calendar-times fa-3x"></i>
        <p>Nenhuma tarefa cadastrada para hoje.</p>
    </div>
{% endfor %}

</div>

</body>
</html>
